cd C:\Project\cloudit-platform\.github\workflows

@'
name: Deploy to Hetzner

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Deploy to server
        env:
          SERVER_IP: ${{ secrets.SERVER_IP }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          ssh ${SERVER_USER}@${SERVER_IP} '
            set -e
            cd /opt/cloudit/cloudit-platform
            git pull origin master

            # Restart infrastructure services
            docker compose -f infra/traefik/docker-compose.yml up -d
            docker compose -f infra/postgres/docker-compose.yml up -d
            docker compose -f infra/redis/docker-compose.yml up -d
            docker compose -f infra/n8n/docker-compose.yml up -d
            docker compose -f infra/uptime-kuma/docker-compose.yml up -d

            # Restart app services if they exist
            if [ -f apps/platform-api/docker-compose.yml ]; then
              docker compose -f apps/platform-api/docker-compose.yml up -d
            fi
            if [ -f apps/platform-web/docker-compose.yml ]; then
              docker compose -f apps/platform-web/docker-compose.yml up -d
            fi

            docker ps
            echo "Deployment complete!"
          '

      - name: Health check
        env:
          SERVER_IP: ${{ secrets.SERVER_IP }}
        run: |
          echo "Checking deployed services..."
          sleep 10
          curl -sf http://${{ secrets.SERVER_IP }} || echo "Server not responding"
'@ | Set-Content deploy.yml -Encoding UTF8