name: Deploy to Hetzner

on:
  push:
    branches:
      - master

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared packages
        run: npm run build --workspace=@cloudit/ui

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Deploy to server
        id: deploy
        env:
          SERVER_IP: ${{ secrets.SERVER_IP }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          DOMAIN: ${{ vars.DOMAIN }}
        run: |
          ssh "${SERVER_USER}@${SERVER_IP}" "DOMAIN='${DOMAIN}' bash -s" <<'REMOTE'
            set -euo pipefail
            cd /opt/cloudit/cloudit-platform
            git fetch origin
            git reset --hard origin/master
            chmod +x infra/scripts/*.sh
            bash infra/scripts/deploy.sh
          REMOTE

      - name: Run health checks
        id: health
        if: steps.deploy.outcome == 'success'
        env:
          SERVER_IP: ${{ secrets.SERVER_IP }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          DOMAIN: ${{ vars.DOMAIN }}
        run: |
          ssh "${SERVER_USER}@${SERVER_IP}" "DOMAIN='${DOMAIN}' bash -s" <<'REMOTE'
            set -euo pipefail
            cd /opt/cloudit/cloudit-platform
            chmod +x infra/scripts/*.sh
            bash infra/scripts/health-check.sh
          REMOTE

      - name: Rollback on failure
        if: failure() && steps.deploy.outcome == 'success'
        env:
          SERVER_IP: ${{ secrets.SERVER_IP }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          DOMAIN: ${{ vars.DOMAIN }}
        run: |
          ssh "${SERVER_USER}@${SERVER_IP}" "DOMAIN='${DOMAIN}' bash -s" <<'REMOTE'
            set -euo pipefail
            cd /opt/cloudit/cloudit-platform
            chmod +x infra/scripts/*.sh
            bash infra/scripts/rollback.sh
          REMOTE

      - name: Setup SSH for notify
        if: always()
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Notify deployment result
        if: always()
        env:
          SERVER_IP: ${{ secrets.SERVER_IP }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts 2>/dev/null
          ssh "${SERVER_USER}@${SERVER_IP}" \
            "echo '[deploy] $(date -Iseconds) status=${{ job.status }} commit=${{ github.sha }} branch=${{ github.ref_name }}' >> /var/log/cloudit-deploy.log"
