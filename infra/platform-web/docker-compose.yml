version: "3.8"

services:
  platform-web:
    build:
      context: ../../apps/platform-web
      dockerfile: Dockerfile
    image: cloudit/platform-web:latest
    container_name: platform-web
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    env_file:
      - ../../apps/platform-web/.env
    environment:
      - NODE_ENV=production
      - PORT=3000
    networks:
      - cloudit
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.platform-web.rule=Host(`app.${DOMAIN:-cloudit.lk}`)"
      - "traefik.http.routers.platform-web.entrypoints=websecure"
      - "traefik.http.routers.platform-web.tls.certresolver=cloudflare"
      - "traefik.http.routers.platform-web.tls.domains[0].main=${DOMAIN:-cloudit.lk}"
      - "traefik.http.routers.platform-web.tls.domains[0].sans=*.${DOMAIN:-cloudit.lk}"
      - "traefik.http.services.platform-web.loadbalancer.server.port=3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M

networks:
  cloudit:
    external: true
