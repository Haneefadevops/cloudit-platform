services:
  orbitone-api:
    build:
      context: ../../apps/orbitone-api
      dockerfile: Dockerfile
    image: cloudit/orbitone-api:latest
    container_name: orbitone-api
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    env_file:
      - ../../apps/orbitone-api/.env
    environment:
      - NODE_ENV=production
      - PORT=3004
    networks:
      - cloudit
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.orbitone-api.rule=Host(`api-orbitone.${DOMAIN:-cloudit.lk}`)"
      - "traefik.http.routers.orbitone-api.entrypoints=websecure"
      - "traefik.http.routers.orbitone-api.tls.certresolver=cloudflare"
      - "traefik.http.routers.orbitone-api.tls.domains[0].main=${DOMAIN:-cloudit.lk}"
      - "traefik.http.routers.orbitone-api.tls.domains[0].sans=*.${DOMAIN:-cloudit.lk}"
      - "traefik.http.services.orbitone-api.loadbalancer.server.port=3004"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3004/api/health/live || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

networks:
  cloudit:
    external: true
