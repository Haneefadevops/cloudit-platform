services:
  orbitone-web:
    build:
      context: ../..
      dockerfile: infra/orbitone-web/Dockerfile
    image: cloudit/orbitone-web:latest
    container_name: orbitone-web
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    env_file:
      - ../../apps/orbitone-web/.env
    environment:
      - NODE_ENV=production
      - PORT=3005
    networks:
      - cloudit
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.orbitone-web.rule=Host(`orbitone.${DOMAIN:-cloudit.lk}`)"
      - "traefik.http.routers.orbitone-web.entrypoints=websecure"
      - "traefik.http.routers.orbitone-web.tls.certresolver=cloudflare"
      - "traefik.http.routers.orbitone-web.tls.domains[0].main=${DOMAIN:-cloudit.lk}"
      - "traefik.http.routers.orbitone-web.tls.domains[0].sans=*.${DOMAIN:-cloudit.lk}"
      - "traefik.http.services.orbitone-web.loadbalancer.server.port=3005"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3005 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M

networks:
  cloudit:
    external: true
