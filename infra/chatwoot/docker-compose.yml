services:
  chatwoot-rails:
    image: chatwoot/chatwoot:latest
    container_name: chatwoot-rails
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    command: ["bundle", "exec", "rails", "s", "-p", "3000", "-b", "0.0.0.0"]
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - RAILS_ENV=production
      - INSTALLATION_ENV=docker
      - RAILS_LOG_TO_STDOUT=true
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DATABASE=chatwoot
      - POSTGRES_USERNAME=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - FRONTEND_URL=${CHATWOOT_FRONTEND_URL}
      - SECRET_KEY_BASE=${CHATWOOT_SECRET_KEY_BASE}
      - DEFAULT_LOCALE=${CHATWOOT_DEFAULT_LOCALE:-en}
      - ENABLE_ACCOUNT_SIGNUP=${CHATWOOT_ENABLE_ACCOUNT_SIGNUP:-false}
    volumes:
      - chatwoot_data:/app/storage
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - cloudit
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.chatwoot.rule=Host(`inbox.thereplyte.com`)"
      - "traefik.http.routers.chatwoot.entrypoints=websecure"
      - "traefik.http.routers.chatwoot.tls.certresolver=cloudflare"
      - "traefik.http.routers.chatwoot.tls.domains[0].main=thereplyte.com"
      - "traefik.http.routers.chatwoot.tls.domains[0].sans=*.thereplyte.com"
      - "traefik.http.services.chatwoot.loadbalancer.server.port=3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

  chatwoot-sidekiq:
    image: chatwoot/chatwoot:latest
    container_name: chatwoot-sidekiq
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    command: ["bundle", "exec", "sidekiq", "-C", "config/sidekiq.yml"]
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - RAILS_ENV=production
      - INSTALLATION_ENV=docker
      - RAILS_LOG_TO_STDOUT=true
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DATABASE=chatwoot
      - POSTGRES_USERNAME=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - FRONTEND_URL=${CHATWOOT_FRONTEND_URL}
      - SECRET_KEY_BASE=${CHATWOOT_SECRET_KEY_BASE}
    volumes:
      - chatwoot_data:/app/storage
    networks:
      - cloudit
    depends_on:
      - chatwoot-rails
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M

volumes:
  chatwoot_data:
    name: cloudit_chatwoot

networks:
  cloudit:
    external: true
