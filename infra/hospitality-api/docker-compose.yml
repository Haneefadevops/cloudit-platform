services:
  hospitality-api:
    build:
      context: ../../apps/hospitality-api
      dockerfile: Dockerfile
    image: cloudit/hospitality-api:latest
    container_name: hospitality-api
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    env_file:
      - ../../apps/hospitality-api/.env
    environment:
      - NODE_ENV=production
      - PORT=3002
    networks:
      - cloudit
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.hospitality-api.rule=Host(`api-hospitality.${DOMAIN:-cloudit.lk}`)"
      - "traefik.http.routers.hospitality-api.entrypoints=websecure"
      - "traefik.http.routers.hospitality-api.tls.certresolver=cloudflare"
      - "traefik.http.routers.hospitality-api.tls.domains[0].main=${DOMAIN:-cloudit.lk}"
      - "traefik.http.routers.hospitality-api.tls.domains[0].sans=*.${DOMAIN:-cloudit.lk}"
      - "traefik.http.services.hospitality-api.loadbalancer.server.port=3002"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3002/api/health/live || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

networks:
  cloudit:
    external: true
