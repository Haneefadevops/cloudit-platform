version: "3.8"

services:
  hospitality-web:
    build:
      context: ../..
      dockerfile: infra/hospitality-web/Dockerfile
    image: cloudit/hospitality-web:latest
    container_name: hospitality-web
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    env_file:
      - ../../apps/hospitality-web/.env
    environment:
      - NODE_ENV=production
      - PORT=3003
    networks:
      - cloudit
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.hospitality-web.rule=Host(`hospitality.${DOMAIN:-cloudit.lk}`)"
      - "traefik.http.routers.hospitality-web.entrypoints=websecure"
      - "traefik.http.routers.hospitality-web.tls.certresolver=cloudflare"
      - "traefik.http.routers.hospitality-web.tls.domains[0].main=${DOMAIN:-cloudit.lk}"
      - "traefik.http.routers.hospitality-web.tls.domains[0].sans=*.${DOMAIN:-cloudit.lk}"
      - "traefik.http.services.hospitality-web.loadbalancer.server.port=3003"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3003 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M

networks:
  cloudit:
    external: true
