services:
  whatsapp-agent-web:
    build:
      context: ../../apps/whatsapp-agent-web
      dockerfile: Dockerfile
      args:
        - API_URL=https://api.thereplyte.com/api
        - NEXT_PUBLIC_API_URL=https://api.thereplyte.com/api
    image: cloudit/whatsapp-agent-web:latest
    container_name: whatsapp-agent-web
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    env_file:
      - ../../apps/whatsapp-agent-web/.env
    environment:
      - NODE_ENV=production
      - PORT=3011
      - NEXT_PUBLIC_API_URL=https://api.thereplyte.com/api
      - API_URL=https://api.thereplyte.com/api
    networks:
      - cloudit
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.whatsapp-agent-web.rule=Host(`app.thereplyte.com`)"
      - "traefik.http.routers.whatsapp-agent-web.entrypoints=websecure"
      - "traefik.http.routers.whatsapp-agent-web.tls.certresolver=cloudflare"
      - "traefik.http.routers.whatsapp-agent-web.tls.domains[0].main=thereplyte.com"
      - "traefik.http.routers.whatsapp-agent-web.tls.domains[0].sans=*.thereplyte.com"
      - "traefik.http.services.whatsapp-agent-web.loadbalancer.server.port=3011"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3011 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M

networks:
  cloudit:
    external: true
