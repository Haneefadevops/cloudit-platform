services:
  whatsapp-agent-api:
    build:
      context: ../../apps/whatsapp-agent-api
      dockerfile: Dockerfile
    image: cloudit/whatsapp-agent-api:latest
    container_name: whatsapp-agent-api
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    env_file:
      - ../../apps/whatsapp-agent-api/.env
    environment:
      - NODE_ENV=production
      - PORT=3010
    networks:
      - cloudit
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.whatsapp-agent-api.rule=Host(`api.thereplyte.com`)"
      - "traefik.http.routers.whatsapp-agent-api.entrypoints=websecure"
      - "traefik.http.routers.whatsapp-agent-api.tls.certresolver=cloudflare"
      - "traefik.http.routers.whatsapp-agent-api.tls.domains[0].main=thereplyte.com"
      - "traefik.http.routers.whatsapp-agent-api.tls.domains[0].sans=*.thereplyte.com"
      - "traefik.http.services.whatsapp-agent-api.loadbalancer.server.port=3010"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3010/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

networks:
  cloudit:
    external: true
