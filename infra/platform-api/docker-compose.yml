version: "3.8"

services:
  platform-api:
    build:
      context: ../../apps/platform-api
      dockerfile: Dockerfile
    image: cloudit/platform-api:latest
    container_name: platform-api
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    env_file:
      - ../../apps/platform-api/.env
    environment:
      - NODE_ENV=production
      - PORT=3001
    networks:
      - cloudit
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.platform-api.rule=Host(`api-platform.${DOMAIN:-cloudit.lk}`)"
      - "traefik.http.routers.platform-api.entrypoints=websecure"
      - "traefik.http.routers.platform-api.tls.certresolver=cloudflare"
      - "traefik.http.routers.platform-api.tls.domains[0].main=${DOMAIN:-cloudit.lk}"
      - "traefik.http.routers.platform-api.tls.domains[0].sans=*.${DOMAIN:-cloudit.lk}"
      - "traefik.http.services.platform-api.loadbalancer.server.port=3001"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3001/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

networks:
  cloudit:
    external: true
