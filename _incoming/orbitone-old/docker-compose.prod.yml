services:
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: https://po1.cloudit.lk/api/v1
        NEXT_PUBLIC_APP_URL: https://po1.cloudit.lk
    environment:
      NEXT_PUBLIC_API_BASE_URL: https://po1.cloudit.lk/api/v1
      NEXT_PUBLIC_APP_URL: https://po1.cloudit.lk
    depends_on:
      - backend
    networks:
      - default
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.orbitone-prod-web.rule=Host(`po1.cloudit.lk`)"
      - "traefik.http.routers.orbitone-prod-web.entrypoints=websecure"
      - "traefik.http.routers.orbitone-prod-web.tls.certresolver=letsencrypt"
      - "traefik.http.services.orbitone-prod-web.loadbalancer.server.port=3000"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env.prod
    depends_on:
      - postgres
      - redis
    networks:
      - default
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.orbitone-prod-api.rule=Host(`po1.cloudit.lk`) && PathPrefix(`/api`)"
      - "traefik.http.routers.orbitone-prod-api.entrypoints=websecure"
      - "traefik.http.routers.orbitone-prod-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.orbitone-prod-api.loadbalancer.server.port=8000"

  postgres:
    image: postgres:17-alpine
    env_file:
      - .env.prod
    volumes:
      - orbitone_postgres_prod:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    volumes:
      - orbitone_redis_prod:/data

volumes:
  orbitone_postgres_prod:
  orbitone_redis_prod:

networks:
  traefik:
    external: true
