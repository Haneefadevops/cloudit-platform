services:
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
        NEXT_PUBLIC_APP_URL: http://localhost:3000
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env.local
    ports:
      - "8000:8000"
    environment:
      NODE_ENV: development
      PORT: 8000
      DATABASE_URL: postgres://orbitone:orbitone@postgres:5432/orbitone_local
      REDIS_URL: redis://redis:6379
      FRONTEND_ORIGIN: http://localhost:3000,http://localhost:3002
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: orbitone
      POSTGRES_PASSWORD: orbitone
      POSTGRES_DB: orbitone_local
    volumes:
      - orbitone_postgres_local:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - orbitone_redis_local:/data

volumes:
  orbitone_postgres_local:
  orbitone_redis_local:
