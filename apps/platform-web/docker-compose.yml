version: "3.8"

services:
  platform-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: platform-web
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    networks:
      - cloudit
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.platform-web.rule=Host(`platform.cloudit.lk`)"
      - "traefik.http.routers.platform-web.entrypoints=websecure"
      - "traefik.http.routers.platform-web.tls.certresolver=cloudflare"
      - "traefik.http.services.platform-web.loadbalancer.server.port=3000"
    depends_on:
      platform-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 384M
        reservations:
          memory: 64M

networks:
  cloudit:
    external: true
